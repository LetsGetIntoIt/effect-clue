# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "effect-clue"

[setup]
script = '''
cd "$CODEX_WORKTREE_PATH"
export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
if [ -s "$NVM_DIR/nvm.sh" ]; then
  . "$NVM_DIR/nvm.sh"
fi
nvm install
nvm use
pnpm install
if [ ! -f .env.local ] && [ -f env.example ]; then
  cp env.example .env.local
fi
'''

[[actions]]
name = "Dev server"
icon = "run"
command = '''
cd "$CODEX_WORKTREE_PATH"
exec pnpm dev
'''

[[actions]]
name = "Test"
icon = "test"
command = '''
cd "$CODEX_WORKTREE_PATH"
pnpm test
'''

[[actions]]
name = "Typecheck"
icon = "test"
command = '''
cd "$CODEX_WORKTREE_PATH"
pnpm typecheck
'''

[[actions]]
name = "Lint"
icon = "test"
command = '''
cd "$CODEX_WORKTREE_PATH"
pnpm lint
'''

[[actions]]
name = "Full verification"
icon = "test"
command = '''
cd "$CODEX_WORKTREE_PATH"
pnpm typecheck && pnpm lint && pnpm test && pnpm knip && pnpm i18n:check
'''
