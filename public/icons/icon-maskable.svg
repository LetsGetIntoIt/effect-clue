<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <!-- Maskable variant — content is contained within the central
         80% safe zone so OS circular masks (Android, iOS) don't
         crop the magnifying glass. Border is dropped because the OS
         handles the icon shape (circle / squircle / rounded square)
         and a fixed border would clash with that. -->
    <rect width="512" height="512" fill="#efe6d3"/>
    <!-- Safe zone is 80% (52..460). Magnifying glass centred in it. -->
    <circle cx="240" cy="240" r="92" fill="none" stroke="#7a1c1c" stroke-width="20"/>
    <line x1="305" y1="305" x2="385" y2="385" stroke="#7a1c1c" stroke-width="26" stroke-linecap="round"/>
    <text x="240" y="266" font-family="Georgia, 'Times New Roman', serif" font-size="110" font-weight="bold" fill="#7a1c1c" text-anchor="middle">?</text>
</svg>
